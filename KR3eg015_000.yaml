body:
  text: 正文一瓢先生濕熱論獨具卓識立言明簡而用藥精奇惜不立湯名學者難於記誦茲編歌訣以便誦習總訣濕熱非從表入里始終當究三焦理夫熱是為天之氣而濕則為地之氣濕得熱而濕愈蒸熱得濕而熱愈熾濕熱兩分其病輕濕熱交混其病駛熱多濕少當清泄濕多熱少當分利濕熱俱多上下閉三焦俱病為難治濕熱化火劫陰津引動肝風痙厥至陽明經胃是沖衢救胃生津扼要旨此條非原文乃撮論中大旨編為總訣以附於首原本共三十五條今將第十條並於首條下二十三二十四兩條亦合而為一故只得三十三條濕熱初起濕熱蒸騰五六月肌表口鼻皆能入太陰脾陽明胃受病多濕熱交蒸夏暑為甚從肌表傷者十之一二從口鼻入者十之八九陽明為水穀之海太陰為濕土之臟故太陰陽明受病居多或兼三焦或涉膜原茲不繁注始則微寒後但熱始則微寒後發熱凡風溫溫熱溫疫皆如此類尚非濕熱病的證但傷寒初起則甚惡寒風溫濕熱等初起則微惡寒此為辨也汗出陽濕有汗陰濕無汗觀下條便知胸痞舌白黃口渴不飲或不渴此則濕熱證之的證論中原注云始惡寒者陽為濕遏而惡寒終非寒傷於表之惡寒但熱不寒則鬱而成熱反惡熱矣熱甚陽明則汗出濕蔽清陽則胸痞濕邪內盛則舌白濕熱交蒸則舌黃熱則液不升而口渴濕則飲內留而不引飲此條濕熱證提綱病在中焦氣分窒病在中焦者如上所謂發熱汗出胸痞口渴舌白等是也藿香蒼朮杏仁蔻仁厚朴半夏菖蒲六一散佩蘭葉枳殼鬱金桔梗此濕熱病初起用藥之大法也濕熱蘊於上中二焦尚未化火只是氣機阻窒參舌白胸痞渴不多飲可審故從藿香正氣太無神術二方化裁去蘇梗白芷甘草等味嫌其疏散太過又恐甘能滋濕加入杏仁枳殼鬱金輕苦微辛開通上中二焦氣分六一散乃河間治暑濕熱之專藥佩蘭葉芳涼逐穢之用耳若兼扶食舌根黃楂肉栝蔞萊蔔子益此證多有挾食者宜加栝蔞楂肉萊蔔子舌根若現黃色即是挾食證原注此原本第一條第十條陰濕傷表陰濕傷表必無汗惡寒身重且頭疼羌活蒼朮香薷藿香薄荷牛蒡等頭不痛將羌活存此條無汗惡寒身重頭痛與感冒寒邪同何以知其為陰濕傷表必有舌白胸痞如首條所云證為表重以辛芳理濕邪稍兼辛溫散表寒蓋頭痛惡寒必挾風邪故加羌活散之頭不痛者去羌活原注此原本第二條陽濕傷表陽濕傷表自汗出汗出不解身仍熱關節煩疼微惡寒濕在肌表身重極此條與上條頗同惟汗出關節煩疼獨異明是濕邪見證云陽濕傷表者以汗出熱不解且口必微渴也豆卷茯苓皮蒼朮皮滑石藿香葉鮮荷葉通草桔梗等味宜不惡寒者去蒼朮此條陽濕傷表故用藥即從三焦分泄不專解表因其有汗也故不惡寒者便去蒼朮皮陰濕傷表無汗用發表陽濕傷表有汗用解肌暗合仲景麻黃桂枝之意宜究心焉原注此原本第三條濕重於熱濕熱舌白用辛開厚朴半夏菖蒲草果煨遍舌白苔為濕盛口雖微渴勿疑猜遍舌白苔滿布為濕邪極盛之候口雖微渴乃液不上升非有熱也故重用辛開以達邪原注此原本第十二條濕熱參半濕漸化熱舌尖紅余濕猶滯舌根白蔻仁半夏大豆卷緑豆衣六一散連翹辛泄之中佐清熱此濕熱參半之證辛泄濕邪慮其劫液故只取蔻仁半夏菖蒲等之辛通而不取蒼朮川朴草果之辛烈甘涼清熱慮其滋濕故只取豆卷連翹緑豆衣六一散之輕清而不用鮮斛知母麥冬之滋膩也用藥頗見斟酌最宜熟玩原注此原本第十三條濕熱蒙閉上焦濕熱證初起口渴身熱熾脘悶或懊憹眼閉時譫語濁邪蒙上焦高者越之是枳殼桔梗梔子淡豆豉宜無汗乾葛使此濁邪蒙閉上焦故脘悶懊憹眼欲迷閉者清陽之氣不舒也時譫語者氣分熱熾心胞受灼也然驗其舌必有白苔且病方初起斷無熱邪即走心胞之理故知為濁邪蒙閉上焦經云在上者引而越之故用梔豉湧泄之劑合枳桔之開提邪從上解矣原注此原本第三十一條濕熱俱重濕熱一二日胸悶不知人瞀亂大叫痛鮮菖蒲草果厚朴檳榔六一散芫荽各重用或加皂角末地漿水煎藥臻濕熱阻閼上中閉病方初起散邪遵此條濕熱俱重之候阻閼上中二焦閉而不達故胸悶不知人瞀亂大叫痛用藥以辛通散邪為急故用草果仁檳榔厚朴直達膜原以破濕熱穢惡黏膩之氣鮮菖蒲開竅泄邪六一散清熱利竅取芫荽者芫荽辛溫香竄內通心脾外達四肢能闢一切穢惡不正之氣故痧出不快者用之取效今引用之亦取內通外達以辟邪也猶恐藥力不及復以皂角末辛通開竅最捷地漿水煎取其水土交混有澄而復清之意能瀉濕中之熱也原注此原本第十四條濕熱化風為痙濕熱證方三四日即口噤而四肢急此乃邪侵經絡中甚則角弓為痙厥蒼耳子威靈仙鮮地龍酒淬川連秦艽滑石絲瓜藤與海楓藤熄風通絡斯方合此條乃濕熱化風為痙口噤四肢拘急甚則角弓反張邪侵經墜之中故用藥稍清濕熱重用熄風通絡濕熱痙厥每相連肝膽三焦風火鬱濕能生熱熱生風風煽火熾亂神識外竄筋經則成痙內並膻中則為厥胃液乾枯風火炎厥而不返終難活傷寒厥者未必即痙痙者未必即厥若濕熱為痙必致厥為厥則必致痙蓋濕熱本在太陰陽明二經病在二經之表者多兼少陽三焦病在二經之裡者每兼厥陰風木以肝膽三焦同司相火陽明太陰之濕久鬱則生熱熱盛則少火皆成壯火火動風生而筋攣脈急則為痙風煽火熾而識亂神迷則為厥內外充斥痙厥並見正氣猶存一線則氣復反而生胃津不克支持則厥不回而死矣所以治痙顧惜津液為主此方乃治痙證初見津液尚在未傷重用泄風通絡正所以保其津液也如津液已虧不可拘執一方當化而裁之可也原注此原本第四條濕熱化火致厥濕熱煩渴舌焦黃或焦紅發痙神昏譫笑狂邪灼心胞營血耗犀角羚羊銀花露與鮮菖蒲連翹玄參鮮生地鉤鉤等更要芳開至寶丹良清熱救陰為急務此條言厥義當量上條言痙此條言厥濕熱化火逼灼營陰心胞受邪神昏譫笑用藥以清熱救陰為急務兼至寶丹開心胞之邪也可知但痙而未厥且痙方初起者猶可散邪通絡若痙厥相兼當以救陰為要原注此原本第五條濕熱蘊結昏痙濕熱昏痙用開泄不效須知邪蘊結涼膈散承氣湯相機從大便不通脈數實此係陽明實熱多下奪陽明為便捷濕熱發痙神昏笑妄用清泄芳開不效者須知熱邪蘊結法非下奪不可更審其脈洪數有力其為熱邪蘊結無疑但上結於胸膈者宜仿涼膈散若下結於腸胃者宜調胃承氣之例此係陽明實熱仍假陽明為出路也原注此原本第六條濕熱化火充斥表裡三焦濕熱化火熱邪燎充斥表裡及三焦煩渴舌焦紅或縮斑疹胸痞自利饒壯熱神昏為痙厥陰津涸竭命難逃急投大劑犀角羚羊角鮮生地紫草玄參銀花露調金汁鮮菖蒲兼蚌水清火救液此方超此條乃痙厥證之最重者上為胸痞下為熱利外發斑疹熱邪充斥表裡三焦陰津消涸勢極凶危重用大劑涼火救液希冀萬一若未曾服過芳開者兼投至寶丹若已經芳開者宜珠黃散原注此原本第七條濕熱阻遏膜原濕熱阻遏於膜原寒熱分爭如瘧狀檳榔厚朴草果柴胡蒼朮藿香菖蒲半夏六一散達原仿濕熱阻遏膜原舌苔必白心胸必痞發為瘧疾是名濕瘧與秋風成瘧有間故仿吳又可達原飲加減以達膜原之邪合入不換金正氣散意祛嵐瘴濕熱也原注此原本第八條濕滯下焦濕熱數日胸中痞自利溺赤口渴膩桔梗杏仁大豆卷澤瀉滑石茯苓豬苓三焦開泄兼分利此條以自利溺赤濕熱滯下焦故以分利為主又胸痞口渴故佐桔梗杏仁豆卷開泄上中二焦源清則流自潔矣原注此原本第十一條濕熱劫津木火犯胃濕熱證四五日口渴脈細數胸中悶欲絶乾嘔不止膽火沖舌光如鏡胃津劫宜用西瓜汁鮮生地汁甘蔗汁濃磨木香香附烏藥鬱金啜生津清熱佐疏通不煎氣味俱全捷此本營虧木旺人邪犯陽明劫津液幸無痰飲雜其中此法施之為尉帖此條從胸悶欲絶乾嘔不止舌光如鏡上著筆用方亦奇不用煎者取其氣之全耳然幸無痰飲夾雜其中故得用清法原注此原本第十五條濕熱挾痰飲濕熱內留挾痰飲嘔吐黏痰清水並滌飲降逆和少陽陽明溫膽湯栝蔞碧玉進此素有痰飲而陽明少陽同病嘔吐清水或痰多黏膩乃濕熱內留木火上逆故用溫膽湯加栝蔞碧玉散滌痰降逆為治與上條嘔同而治異正當參看原注此原本第十六條濕熱犯上焦肺胃不和濕熱嘔惡無休止晝夜不瘥如欲死是因肺胃不相和胃熱移肺肺還胃川連蘇葉各數分兩味煎湯服之美肺胃不和最易致嘔今濕熱嘔惡不止欲死者因肺胃不和胃熱移肺肺不受邪還歸於胃也然多幹嘔是屬上焦並無酸水苦水脅痛等證其非肝膽之嘔可知又無清水黏痰非痰飲又可知夫治嘔之法必用苦辛通降然有分別如嘔惡吞酸脅痛者用左金法川連同吳萸服直達肝經鬱結之熱如嘔惡胸痞舌白者川連同乾薑服以開中焦之痞此肺胃不和嘔惡不止用川連之苦降雖同而用蘇葉之辛通則異蓋蘇葉質輕氣味辛芳能宣通上焦肺胃合川連之苦能燥濕寒能清熱以治濕熱在上焦作嘔尤足稱為神化故本論云煎湯呷下即止嘔原注此原本第十七條暑濕入肺暑濕入肺為咳嗽甚至喘而不得眠葶藶子六一散枇杷葉瀉肺消暑濕邪宣按韓飛霞治久雨天行咳嗽頭痛用六一散蔥薑湯調服應手取效蓋甲已土運濕令痰壅肺氣上竅但泄其膀胱下竅而已不在咳嗽例也此方即師其意加葶藶枇杷葉瀉肺同六一消暑濕引從下竅而泄化裁之妙也原注此原本第十八條濕熱暑邪閉腠理濕熱暑邪閉腠理始終無汗胸中痞肌肉微疼身熱燎六一散一兩研末細薄荷錢許泡湯調服下頓時汗即至六一散解肌利濕清熱統治暑濕熱三焦之證河間贊為凡間仙藥合上條並參可知其功用之廣活法在人顧用者之巧拙何如耳原注此原本二十一條濕熱傷營風陽上逆濕熱傷營風火升時時汗出熱仍蒸忽然頭痛須防痙女貞子生地玄參羚羊角鉤藤蔓荊子此濕熱傷營風陽上逆故汗出熱仍不除忽頭痛不止須防成痙藥用滋養營陰為主而熄風佐之原注此原本第二十條濕邪傷陽濕熱脈細舌苔白身冷汗泄胸痞口渴濕中少陰濕中太陰口不渴濕中少陰則口渴陽欲亡茯苓益智仁人參附子白朮上條熱傷營陰風陽上逆故以女貞子生地羚羊角鉤藤等養營泄風為治此條濕邪傷陽陽欲先亡故以參附苓術等扶陽逐濕為法因其舌白胸痞脈細知為濕傷陽氣更審身冷汗泄知為陽氣欲亡口中雖渴乃少陰本證並非屬熱故用溫法而無疑也加益智醒脾陽以濕從土化也原注此原本第二十五條濕困脾陽濕困脾陽但惡寒初起不熱腹疼泄利脈沉弱諳面黃不渴四肢倦用藥須從溫法參大順散方杏薑桂甘縮脾飲方草果烏梅砂仁甘草葛根扁豆來復丹方硫黃硝石青皮陳皮五靈脂玄精石等冷香飲子附子陳皮甘草淡乾薑草果效皆堪此濕困脾陽之候觀腹痛泄利脈沉屬太陰里證又面黃口不渴四肢懶倦屬太陰外現之證初起便惡寒而不身熱是中於陰濕非陽濕也當用溫法無疑但分輕重耳或問何煎藥曰薑附苓朮川朴益智等虛者參附理中法原注此原本第二十六條濕熱大汗亡衛陽濕熱四五日忽然大汗淋漓出手足厥逆寒脈細如絲或欲絶觀其脈證似亡陽神清語亮非陽脫況其起坐能自如又見莖痛兼口渴此乃大汗亡衛陽濕熱之邪仍阻結表裡不通脈故伏仍須去濕兼清熱五苓散去朮加生黃耆皮酒淬川連並滑石原文云濕熱證四五日忽大汗出手足冷脈細欲絶口渴莖痛而起坐自如神清語亮乃汗出過多衛外之陽暫亡濕熱之邪仍結一時表裡不通脈故伏非真陽外脫也宜五苓去朮加滑石酒淬川連生黃耆皮徐鑑泉曰此條脈證全似亡陽之候而獨於舉動聲音神氣中得其真情噫此醫之所貴識見也按五苓散去白朮者以濕熱仍結於中而術性守中故也口渴莖痛故加川連滑石汗太多故加生耆皮固衛陽合桂苓豬澤四味通陽消暑去濕恰如其數原注此原本第二十九條熱深厥深下體客寒濕熱證發神昏痙設兼陰縮兩足冷實熱虛寒須細審發痙神昏多由熱盛而陰縮足冷又似虛寒故須細審具如下文虛寒便利脈沉微既見陰縮足冷又見泄利脈沉微雖神昏發痙亦屬虛寒陽氣欲脫之候實熱便祕渴喜飲既見昏痙又便祕不通煩渴喜飲雖陰縮足冷亦屬熱深厥深之候諦觀本證無一虛知由下體客寒進既無下利脈沉微則非虛寒矣何故足冷陰縮始知下體受寒一時營氣不通使然不但證非虛寒並非上熱下寒之可擬也只用辛溫之品煎湯熏熏洗兩足治法仍從濕熱訂仍用清泄之法原注此原本第三十條胃津劫奪邪熱內據濕熱劫津邪內據舌硬苔黃起芒刺神昏譫語不知人囊縮搐搦危極矣鮮生地鮮首烏蘆根鮮稻根甘涼潤下無傷胃脈若有力大便堅大黃加入方相配胃津劫奪熱邪內據既已昏痙又見舌硬囊縮為厥陰之死候幸脈不微細尚見弦緩故仿承氣之例以甘涼易苦寒潤下泄邪不傷胃氣若脈有力大便不解大黃亦可加入也原注此原本第三十五條熱邪入營迫血妄行熱毒入營邪欲泄上下失血口鼻及前後二陰皆失血或汗血從汗孔出血名曰血汗大劑犀角地黃湯犀角地黃丹皮赤芍銀花連翹茜草紫草加無失熱毒入營營血如沸而致上下失血或汗血勢極危矣而猶不即壞者以毒從血出生機在是大進涼血解毒救陰泄邪邪解而血自止矣血止後須進參耆善後乃得原注此原本第三十三條邪入厥陰主客交渾濕熱證經七八日口不渴而聲不出飲食不討亦不卻神昏不語形默默此邪深入厥陰經主客交渾難解釋芳香涼泄俱無效加減三甲散方合醋炒鱉甲生天蟲土炒穿山甲酒醉地鱉柴胡桃仁等味參破滯通瘀邪自撤此邪入厥陰主客又交渾氣滯血瘀邪不得泄故用吳又可三甲散加減去龜甲之滋蟅蟲之猛牡蠣之澀加入酒醉地鱉蟲柴胡桃仁直入厥陰破滯通瘀泄絡而邪解矣原注此原本第三十四條濕熱中虛升降悖逆濕熱數日忽吐瀉中氣虧損升降乖扁豆蓮心半夏苡仁甘草茯苓生穀芽甚者當參理中法太陰憊甚用無差原文云按法治濕熱證數日後忽吐下一時並至非關藥誤乃中氣虧損升降悖逆也法當和中故用藥如此若太陰憊甚中氣不支則非理中不可原注此原本第二十二條餘邪內留膽氣不舒濕熱按法治諸證悉皆己惟獨目不瞑瞑則夢驚悸此係餘邪留膽氣不舒耳宜用薑汁炒棗仁豬膽皮兼酒浸郁李仁膽以合膽酒引之郁李去滯下肝系酸棗安神薑散邪此方此法稱靈祕古人治驚後肝系滯而不下始終目不瞑者用郁李之滑以去著今病後濕熱餘邪內留膽氣不舒故目不瞑則驚悸夢惕用豬膽皮以清膽熱郁李仁以下肝系酒入於胃其氣先注於膽故借酒引郁李入膽也棗仁安神而制以薑汁安神而兼散邪也用藥如此可謂心敏手靈者矣原注此原本第二十七條餘邪蒙閉清陽胃氣不舒濕熱已解餘邪滯蒙閉清陽胃不舒知飢不食脘微悶投劑輕清宣上奇藿香薄荷佩蘭荷葉枇杷葉鮮稻六般俱用葉相宜蘆尖更有冬瓜子此法時師知不知此濕熱已解餘邪蒙閉清陽胃氣不舒故脘中微悶知飢不食用極輕清芬芳之品宣揚升降上焦之氣鮮荷葉升清氣佩蘭葉除濁氣枇杷葉降肺氣鮮稻葉資胃氣鮮藿香葉鮮荷葉辛涼散上焦之熱蘆尖冬瓜子甘淡泄上焦之濕不涉一味重濁之藥粗工當此斷乎不能矣原注此原本第九條下後正傷胃氣不輸濕熱開泄下奪後惡證雖平元氣傷神思不清唇齒燥倦語不食溺數黃胃氣不輸肺不布清滋膩藥不可嘗木瓜甘草人參麥冬川斛鮮蓮心鮮稻葉採鮮芳生津醒胃和中氣生穀芽湯煎藥良濕熱證開泄下奪之後惡候雖平而元氣已傷故神思不清倦語不思飲食溺數黃唇齒乾胃氣不輸肺氣不布難用清滋膩濁之藥故此生津和胃一法清補元氣江南之人體氣薄弱最宜仿此原注此原本第二十八條熱入厥陰熱犯少陰濕熱證已十餘日腹時痛時圊血肛門熱熱邪傳入厥陰經左關弦數是其訣治法宜仿白頭翁湯入陰升陽以涼血仲景治熱痢下重用白頭翁湯白頭翁北秦皮黃連黃柏涼散厥陰之熱今雖不下利而肛門熱痛腹痛圊血安得不用此方乎假如尺脈數少陰熱邪可徵而口乾渴下利心煩咽痛或熱邪直犯少陰經豬膚涼潤方為得仲景云少陰病下利咽痛胸滿心煩者豬膚湯主之王晉三解曰腎應彘而肺主膚腎液下泄不能上熏於肺致絡燥而為咽痛又非甘草所能治矣當以豬膚潤肺腎之燥解虛煩之熱白粉白蜜緩於中俾豬膚比類而致津液從腎上入肺中循喉嚨復從肺出絡心注胸中而上中下燥邪盡解矣原注此原本第二十三條二十四條餘邪滯絡濕熱病後陰液虧餘邪留滯絡中羈口渴汗出骨節痛不已元米湯泡於朮奇隔宿去朮煎飲服養陰逐濕好思維病後濕邪未盡陰液已傷故口渴汗出骨節隱痛不已乃餘邪留滯經絡中也此時救液則助濕祛濕則劫陰宗仲景麻沸湯之意取氣不取味走陽不走陰用糯米湯泡於朮隔一宿去朮煎飲之養陰逐濕兩擅其長真匪夷所思者原注此原本第十九條熱入血室濕熱方張經水適來神昏譫語舌無苔脈滑數而胸腹痛熱邪入血室要清開犀角連翹茜草貫仲銀花露紫草鮮菖蒲重用該熱入血室晝則明瞭夜則譫語葉氏溫熱論中較此條言之尤詳原注此原本第三十二條
